# Based on https://github.com/tree-sitter/tree-sitter-python/blob/master/.github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - binding.gyp
  pull_request:
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - binding.gyp

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: true
          test-python: true
          test-go: false
          test-swift: false
      - name: Set up examples
        run: |-
          git clone https://github.com/ros2/common_interfaces examples/common_interfaces --single-branch --depth=1 --filter=blob:none
          git clone https://github.com/ros2/rcl_interfaces examples/rcl_interfaces --single-branch --depth=1 --filter=blob:none
          git clone https://github.com/ros2/test_interface_files examples/test_interface_files --single-branch --depth=1 --filter=blob:none
      - name: Parse examples
        uses: tree-sitter/parse-action@v4
        with:
          files: |
            examples/**/*.msg
            examples/**/*.srv
            examples/**/*.action
          # invalid-files: |
          #   examples/cpython/Lib/test/tokenizedata/badsyntax_3131.py
