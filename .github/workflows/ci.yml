# Based on https://github.com/tree-sitter/tree-sitter-python/blob/master/.github/workflows/ci.yml
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - binding.gyp
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - binding.gyp
      - .github/workflows/ci.yml

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-python: true
          test-go: false
          test-swift: false
      - name: Install vcs2l
        uses: threeal/pipx-install-action@v1
        with:
          packages: vcs2l
      - name: Set up examples (Linux & MacOS)
        if: runner.os != 'Windows'
        run: vcs import --shallow < examples.repos
      - name: Set up examples (Windows)
        if: runner.os == 'Windows'
        run: cmd.exe /c "vcs import --shallow < ./examples.repos"
      - name: Parse examples
        uses: tree-sitter/parse-action@v4
        with:
          files: |
            examples/**/*.msg
            examples/**/*.srv
            examples/**/*.action
          # invalid-files: |
          #   examples/cpython/Lib/test/tokenizedata/badsyntax_3131.py
